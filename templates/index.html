<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи</title>
    <link rel="stylesheet" href="./static/style.CSS">
</head>
<body>
    <div class="container">
        <h1>📋 Мои задачи</h1>

        <div class="add-task">
            <input
                type="text"
                id="taskInput"
                placeholder="Что нужно сделать?"
                maxlength="100"
                autocomplete="off"
            >
            <button id="addBtn">Добавить</button>
        </div>

        <div class="task-stats">
            <span id="totalTasks">Всего: 0</span>
            <span id="completedTasks">Выполнено: 0</span>
        </div>

        <ul class="task-list" id="taskList">
            <!-- Задачи будут добавляться сюда -->
        </ul>

        <div class="clear-completed">
            <button id="clearCompletedBtn">🗑️ Очистить выполненные</button>
        </div>
    </div>

    <script>
        // Загружаем задачи из localStorage или создаем пустой массив
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        // DOM элементы
        const taskList = document.getElementById('taskList');
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const totalTasksSpan = document.getElementById('totalTasks');
        const completedTasksSpan = document.getElementById('completedTasks');
        const clearCompletedBtn = document.getElementById('clearCompletedBtn');

        // Функция для форматирования даты
        function formatDate(date) {
            const now = new Date(date);
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        }

        // Функция для сохранения задач в localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateStats();
        }

        // Функция для обновления статистики
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            totalTasksSpan.textContent = `Всего: ${total}`;
            completedTasksSpan.textContent = `Выполнено: ${completed}`;
        }

        // Функция для отображения задач
        function renderTasks() {
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-message">✨ У вас пока нет задач. Добавьте первую!</div>';
                updateStats();
                return;
            }

            let html = '';
            tasks.forEach((task, index) => {
                // Форматируем дату создания
                const createdDate = task.created_at ? formatDate(task.created_at) : 'Дата не указана';

                html += `
                    <li class="task-item ${task.completed ? 'completed' : ''}" data-index="${index}">
                        <input
                            type="checkbox"
                            class="task-checkbox"
                            ${task.completed ? 'checked' : ''}
                            onchange="toggleTask(${index})"
                        >
                        <div style="flex: 1;">
                            <span class="task-text">${escapeHtml(task.text)}</span>
                            <div style="font-size: 11px; color: #999; margin-top: 4px;">
                                📅 Создана: ${createdDate}
                                ${task.completed_at ? `<br>✅ Выполнена: ${formatDate(task.completed_at)}` : ''}
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
                    </li>
                `;
            });
            taskList.innerHTML = html;
            updateStats();
        }

        // Функция для экранирования HTML-спецсимволов (защита от XSS)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Функция для добавления новой задачи
        function addTask() {
            const text = taskInput.value.trim();

            if (text === '') {
                alert('Пожалуйста, введите текст задачи');
                return;
            }

            if (text.length > 100) {
                alert('Текст задачи не должен превышать 100 символов');
                return;
            }

            const newTask = {
                text: text,
                completed: false,
                created_at: new Date().toISOString(),  // ДОБАВЛЕНА ДАТА СОЗДАНИЯ
                completed_at: null                      // ДОБАВЛЕНА ДАТА ВЫПОЛНЕНИЯ
            };

            tasks.push(newTask);
            saveTasks();
            renderTasks();

            taskInput.value = '';
            taskInput.focus();
        }

        // Функция для переключения статуса задачи
        window.toggleTask = function(index) {
            tasks[index].completed = !tasks[index].completed;

            // Если задача выполнена - добавляем дату выполнения
            if (tasks[index].completed) {
                tasks[index].completed_at = new Date().toISOString();
            } else {
                // Если сняли отметку - удаляем дату выполнения
                tasks[index].completed_at = null;
            }

            saveTasks();
            renderTasks();
        };

        // Функция для удаления задачи
        window.deleteTask = function(index) {
            if (confirm('Удалить задачу?')) {
                tasks.splice(index, 1);
                saveTasks();
                renderTasks();
            }
        };

        // Функция для очистки выполненных задач
        function clearCompleted() {
            const completedCount = tasks.filter(task => task.completed).length;

            if (completedCount === 0) {
                alert('Нет выполненных задач для очистки');
                return;
            }

            if (confirm(`Очистить ${completedCount} выполненных ${getWordForm(completedCount)}?`)) {
                tasks = tasks.filter(task => !task.completed);
                saveTasks();
                renderTasks();
            }
        }

        // Вспомогательная функция для склонения слова "задача"
        function getWordForm(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'задачу';
            if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) return 'задачи';
            return 'задач';
        }

        // Обработчики событий
        addBtn.addEventListener('click', addTask);

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        clearCompletedBtn.addEventListener('click', clearCompleted);

        // Обновляем примеры задач с датами
        if (tasks.length === 0) {
            const now = new Date();
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);

            tasks = [
                {
                    text: 'Купить продукты',
                    completed: false,
                    created_at: now.toISOString(),
                    completed_at: null
                },
                {
                    text: 'Сделать зарядку',
                    completed: true,
                    created_at: yesterday.toISOString(),
                    completed_at: now.toISOString()
                },
                {
                    text: 'Почитать книгу',
                    completed: false,
                    created_at: yesterday.toISOString(),
                    completed_at: null
                }
            ];
            saveTasks();
        }

        // Инициализация
        renderTasks();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .add-task input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .add-task input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-task button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .add-task button:hover {
            background: #5a67d8;
        }

        .add-task button:active {
            transform: scale(0.95);
        }

        .task-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
            padding: 0 5px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
            transition: background 0.3s;
        }

        .task-item:hover {
            background: #f1f3f5;
        }

        .task-item.completed {
            opacity: 0.8;
            background: #e9ecef;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #adb5bd;
        }

        .task-checkbox {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #48bb78;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            color: #2d3748;
            word-break: break-word;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #fc8181;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
            opacity: 0.7;
        }

        .delete-btn:hover {
            color: #f56565;
            background: #fed7d7;
            opacity: 1;
        }

        .empty-message {
            text-align: center;
            color: #a0aec0;
            padding: 40px 20px;
            font-size: 16px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .clear-completed {
            text-align: center;
            margin-top: 20px;
        }

        .clear-completed button {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .clear-completed button:hover {
            color: #f56565;
            background: #fed7d7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Мои задачи</h1>

        <div class="add-task">
            <input
                type="text"
                id="taskInput"
                placeholder="Что нужно сделать?"
                maxlength="100"
                autocomplete="off"
            >
            <button id="addBtn">Добавить</button>
        </div>

        <div class="task-stats">
            <span id="totalTasks">Всего: 0</span>
            <span id="completedTasks">Выполнено: 0</span>
        </div>

        <ul class="task-list" id="taskList">
            <!-- Задачи будут добавляться сюда -->
        </ul>

        <div class="clear-completed">
            <button id="clearCompletedBtn">🗑️ Очистить выполненные</button>
        </div>
    </div>

    <script>
        // Загружаем задачи из localStorage или создаем пустой массив
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        // DOM элементы
        const taskList = document.getElementById('taskList');
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const totalTasksSpan = document.getElementById('totalTasks');
        const completedTasksSpan = document.getElementById('completedTasks');
        const clearCompletedBtn = document.getElementById('clearCompletedBtn');

        // Функция для сохранения задач в localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateStats();
        }

        // Функция для обновления статистики
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            totalTasksSpan.textContent = `Всего: ${total}`;
            completedTasksSpan.textContent = `Выполнено: ${completed}`;
        }

        // Функция для отображения задач
        function renderTasks() {
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-message">✨ У вас пока нет задач. Добавьте первую!</div>';
                updateStats();
                return;
            }

            let html = '';
            tasks.forEach((task, index) => {
                html += `
                    <li class="task-item ${task.completed ? 'completed' : ''}" data-index="${index}">
                        <input
                            type="checkbox"
                            class="task-checkbox"
                            ${task.completed ? 'checked' : ''}
                            onchange="toggleTask(${index})"
                        >
                        <span class="task-text">${escapeHtml(task.text)}</span>
                        <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
                    </li>
                `;
            });
            taskList.innerHTML = html;
            updateStats();
        }

        // Функция для экранирования HTML-спецсимволов (защита от XSS)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Функция для добавления новой задачи
        function addTask() {
            const text = taskInput.value.trim();

            if (text === '') {
                alert('Пожалуйста, введите текст задачи');
                return;
            }

            if (text.length > 100) {
                alert('Текст задачи не должен превышать 100 символов');
                return;
            }

            const newTask = {
                text: text,
                completed: false
            };

            tasks.push(newTask);
            saveTasks();
            renderTasks();

            taskInput.value = '';
            taskInput.focus();
        }

        // Функция для переключения статуса задачи
        window.toggleTask = function(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        };

        // Функция для удаления задачи
        window.deleteTask = function(index) {
            if (confirm('Удалить задачу?')) {
                tasks.splice(index, 1);
                saveTasks();
                renderTasks();
            }
        };

        // Функция для очистки выполненных задач
        function clearCompleted() {
            const completedCount = tasks.filter(task => task.completed).length;

            if (completedCount === 0) {
                alert('Нет выполненных задач для очистки');
                return;
            }

            if (confirm(`Очистить ${completedCount} выполненных ${getWordForm(completedCount)}?`)) {
                tasks = tasks.filter(task => !task.completed);
                saveTasks();
                renderTasks();
            }
        }

        // Вспомогательная функция для склонения слова "задача"
        function getWordForm(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'задачу';
            if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) return 'задачи';
            return 'задач';
        }

        // Обработчики событий
        addBtn.addEventListener('click', addTask);

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        clearCompletedBtn.addEventListener('click', clearCompleted);

        // Инициализация
        renderTasks();

        // Добавляем несколько примеров задач при первом запуске
        if (tasks.length === 0) {
            tasks = [
                { text: 'Купить продукты', completed: false },
                { text: 'Сделать зарядку', completed: true },
                { text: 'Почитать книгу', completed: false }
            ];
            saveTasks();
            renderTasks();
        }
    </script>
</body>
</html>
